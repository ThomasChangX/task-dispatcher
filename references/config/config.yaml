# =============================================================================
# config.yaml - task-dispatcher 主配置文件
# 6 阶段流程配置、版本信息、依赖引用
# =============================================================================

# ---------------------------------------------------------------------------
# 插件基本信息
# ---------------------------------------------------------------------------
plugin:
  name: "task-dispatcher"
  display_name: "智能任务分发中枢 v2"
  version: "2.0.0"
  description: "严格遵循 6 阶段流程的任务分发系统"
  author: "OpenClaw Team"

# ---------------------------------------------------------------------------
# 6 阶段流程配置 (与 v2 SKILL.md 一致)
# ---------------------------------------------------------------------------
workflow:
  # ---------------------------------------------------------------------------
  # 阶段 1: 需求分析
  # ---------------------------------------------------------------------------
  - stage: 1_requirement_analysis
    name: "需求分析"
    description: "提取任务目标、约束条件、判定任务类型"
    required: true
    actions:
      - "提取任务目标"
      - "识别约束条件"
      - "判定任务类型 (9种)"
      - "生成需求分析报告"
    output:
      - task_goal
      - constraints
      - task_type
      - complexity_level

  # ---------------------------------------------------------------------------
  # 阶段 2: 研究分析
  # ---------------------------------------------------------------------------
  - stage: 2_research_analysis
    name: "研究分析"
    description: "根据任务类型调用相应 agent 收集信息"
    required: true
    actions:
      - "调用 researcher 收集信息"
      - "分析技术方案"
      - "生成研究分析报告"
    condition: "必须执行，不可跳过"
    output:
      - research_findings
      - technical_analysis
      - recommendations

  # ---------------------------------------------------------------------------
  # 阶段 3: 方案确认
  # ---------------------------------------------------------------------------
  - stage: 3_plan_confirmation
    name: "方案确认"
    description: "基于研究产出执行方案，等用户确认"
    required: true
    actions:
      - "生成任务拆解表格"
      - "展示任务列表"
      - "等待用户确认"
      - "确认后进入执行阶段"
    condition: "必须用户确认后才能执行"
    output:
      - task_breakdown
      - execution_plan
      - confirmation_status

  # ---------------------------------------------------------------------------
  # 阶段 4: 任务拆解
  # ---------------------------------------------------------------------------
  - stage: 4_task_breakdown
    name: "任务拆解"
    description: "生成结构化任务列表"
    required: true
    actions:
      - "拆解子任务"
      - "分配 Agent"
      - "设置依赖关系"
      - "设置超时时间"
    output:
      - subtasks
      - agent_assignments
      - dependencies

  # ---------------------------------------------------------------------------
  # 阶段 5: 分发执行
  # ---------------------------------------------------------------------------
  - stage: 5_execution
    name: "分发执行"
    description: "分发给合适的 agent 执行"
    required: true
    actions:
      - "按任务序列分发 Agent"
      - "执行任务"
      - "收集执行结果"
      - "触发评估节点"
    output:
      - execution_results
      - evaluation_reports

  # ---------------------------------------------------------------------------
  # 阶段 6: 验证收尾
  # ---------------------------------------------------------------------------
  - stage: 6_verification
    name: "验证收尾"
    description: "验证结果、更新状态、完成任务"
    required: true
    actions:
      - "reviewer 验证结果"
      - "tester 验证功能"
      - "docs_writer 更新文档"
      - "retrospective 复盘总结"
      - "生成最终报告"
    output:
      - final_report
      - verification_status
      - lessons_learned

# ---------------------------------------------------------------------------
# 配置文件引用
# ---------------------------------------------------------------------------
config_references:
  agents_config: "agents.yaml"
  tasks_config: "tasks.yaml"
  timeouts_config: "timeouts.yaml"

# ---------------------------------------------------------------------------
# 验证规则
# ---------------------------------------------------------------------------
validation_rules:
  require_confirmation: true
  require_research: true
  enable_evaluation: true
  enable_failure_recovery: true

# ---------------------------------------------------------------------------
# 协作模式设置
# ---------------------------------------------------------------------------
collaboration:
  default_mode: "tools"  # 默认使用 Agents as Tools 模式
  supported_modes:
    - tools
    - swarm
    - graph
    - workflow

# ---------------------------------------------------------------------------
# 日志与监控
# ---------------------------------------------------------------------------
logging:
  enabled: true
  level: "info"
  log_execution: true
  log_evaluation: true

# ---------------------------------------------------------------------------
# 性能设置
# ---------------------------------------------------------------------------
performance:
  max_concurrent_agents: 5
  default_timeout: 300
  enable_progress_tracking: true
  enable_stage_reporting: true
