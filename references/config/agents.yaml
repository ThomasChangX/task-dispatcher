# =============================================================================
# agents.yaml - 12 个 Agent 完整配置
# 对应 AGENTS.md 中的 Subagents 列表
# =============================================================================

agents:
  # ---------------------------------------------------------------------------
  # 架构设计 Agent
  # ---------------------------------------------------------------------------
  - id: architect
    name: "架构设计师"
    description: "系统设计、技术选型、架构方案制定"
    capabilities:
      - 系统架构设计
      - 技术选型分析
      - 性能优化建议
      - 架构评审
    default_timeout: 600
    max_retries: 2

  # ---------------------------------------------------------------------------
  # 编码实现 Agent
  # ---------------------------------------------------------------------------
  - id: coder
    name: "编码工程师"
    description: "写代码、改代码、调试、代码实现"
    capabilities:
      - 功能开发
      - 代码重构
      - Bug修复
      - 调试排查
    default_timeout: 300
    max_retries: 3

  # ---------------------------------------------------------------------------
  # 批评审查 Agent
  # ---------------------------------------------------------------------------
  - id: critic
    name: "批评家"
    description: "方案评审、风险识别、代码审查"
    capabilities:
      - 方案评审
      - 风险评估
      - 代码质量审查
      - 安全审计
    default_timeout: 300
    max_retries: 2

  # ---------------------------------------------------------------------------
  # 运维部署 Agent
  # ---------------------------------------------------------------------------
  - id: devops
    name: "运维工程师"
    description: "部署、运维、监控、基础设施管理"
    capabilities:
      - 应用部署
      - 容器编排
      - CI/CD 配置
      - 监控告警
    default_timeout: 600
    max_retries: 2

  # ---------------------------------------------------------------------------
  # 文档写作 Agent
  # ---------------------------------------------------------------------------
  - id: docs_writer
    name: "文档工程师"
    description: "文档、说明、教程、技术文档编写"
    capabilities:
      - 技术文档
      - API 文档
      - 用户指南
      - 教程编写
    default_timeout: 300
    max_retries: 2

  # ---------------------------------------------------------------------------
  # 诊断分析 Agent
  # ---------------------------------------------------------------------------
  - id: inspector
    name: "诊断师"
    description: "问题定位、根因分析、故障排查"
    capabilities:
      - 问题定位
      - 根因分析
      - 性能分析
      - 日志分析
    default_timeout: 300
    max_retries: 3

  # ---------------------------------------------------------------------------
  # 调研搜索 Agent
  # ---------------------------------------------------------------------------
  - id: researcher
    name: "研究员"
    description: "信息收集、分析调研、技术调研"
    capabilities:
      - 技术调研
      - 竞品分析
      - 方案研究
      - 知识收集
    default_timeout: 300
    max_retries: 2

  # ---------------------------------------------------------------------------
  # 复盘总结 Agent
  # ---------------------------------------------------------------------------
  - id: retrospective
    name: "复盘师"
    description: "项目复盘、经验总结、改进建议"
    capabilities:
      - 项目复盘
      - 经验总结
      - 改进建议
      - 知识沉淀
    default_timeout: 300
    max_retries: 2

  # ---------------------------------------------------------------------------
  # 代码审查 Agent
  # ---------------------------------------------------------------------------
  - id: reviewer
    name: "审查员"
    description: "PR 审查、代码检查、结果评估"
    capabilities:
      - 代码审查
      - 结果评估
      - 质量检查
      - 测试验证
    default_timeout: 300
    max_retries: 2

  # ---------------------------------------------------------------------------
  # 定时任务 Agent
  # ---------------------------------------------------------------------------
  - id: scheduler
    name: "调度师"
    description: "Cron 任务、定时提醒、定时执行"
    capabilities:
      - Cron 配置
      - 定时任务
      - 提醒设置
      - 调度管理
    default_timeout: 300
    max_retries: 2

  # ---------------------------------------------------------------------------
  # 测试验证 Agent
  # ---------------------------------------------------------------------------
  - id: tester
    name: "测试工程师"
    description: "写测试、验证功能、测试覆盖"
    capabilities:
      - 单元测试
      - 集成测试
      - E2E 测试
      - 测试覆盖
    default_timeout: 300
    max_retries: 3

  # ---------------------------------------------------------------------------
  # 通用执行 Agent (兜底)
  # ---------------------------------------------------------------------------
  - id: worker
    name: "通用执行者"
    description: "无特定专长 Agent 时的兜底选择"
    capabilities:
      - 通用任务执行
      - 杂项任务
      - 简单任务处理
    default_timeout: 300
    max_retries: 2
