# =============================================================================
# tasks.yaml - 任务类型配置
# 包含: 9种任务类型 + 4种协作模式 + 评估节点 + 失败处理
# =============================================================================

# ---------------------------------------------------------------------------
# 任务类型定义 (9种)
# ---------------------------------------------------------------------------
task_types:
  # ---------------------------------------------------------------------------
  # 1. 修复任务 - Bug 修复流程
  # ---------------------------------------------------------------------------
  - id: fix
    name: "修复任务"
    description: "Bug 修复、问题修复"
    agent_sequence:
      - inspector    # 诊断分析
      - coder        # 编码实现
      - critic       # 代码审查
      - tester       # 测试验证
      - reviewer     # 结果评估
      - docs_writer  # 文档更新
      - retrospective # 复盘总结
    default_timeout: 600
    priority: high

  # ---------------------------------------------------------------------------
  # 2. 新功能开发
  # ---------------------------------------------------------------------------
  - id: feature
    name: "新功能开发"
    description: "新功能开发、功能代码实现"
    agent_sequence:
      - researcher   # 技术调研
      - coder        # 编码实现
      - reviewer     # 代码审查
      - tester       # 测试验证
    default_timeout: 600
    priority: high

  # ---------------------------------------------------------------------------
  # 3. 架构设计
  # ---------------------------------------------------------------------------
  - id: architecture
    name: "架构设计"
    description: "系统设计、技术选型、架构方案"
    agent_sequence:
      - architect    # 架构设计
      - critic       # 方案评审
      - reviewer     # 方案审查
    default_timeout: 600
    priority: medium

  # ---------------------------------------------------------------------------
  # 4. 调研任务
  # ---------------------------------------------------------------------------
  - id: research
    name: "调研任务"
    description: "信息收集、分析调研、技术调研"
    agent_sequence:
      - researcher   # 调研分析
    default_timeout: 300
    priority: medium

  # ---------------------------------------------------------------------------
  # 5. 文档任务
  # ---------------------------------------------------------------------------
  - id: documentation
    name: "文档任务"
    description: "文档、说明、教程编写"
    agent_sequence:
      - docs_writer  # 文档编写
      - reviewer     # 文档审查
    default_timeout: 300
    priority: low

  # ---------------------------------------------------------------------------
  # 6. 部署运维
  # ---------------------------------------------------------------------------
  - id: devops
    name: "部署运维"
    description: "部署、运维、监控"
    agent_sequence:
      - devops       # 部署运维
      - reviewer     # 结果评估
    default_timeout: 600
    priority: high

  # ---------------------------------------------------------------------------
  # 7. 代码审查
  # ---------------------------------------------------------------------------
  - id: review
    name: "代码审查"
    description: "PR 审查、代码检查"
    agent_sequence:
      - reviewer     # 代码审查
      - critic       # 质量评审
    default_timeout: 300
    priority: medium

  # ---------------------------------------------------------------------------
  # 8. 定时任务
  # ---------------------------------------------------------------------------
  - id: scheduled
    name: "定时任务"
    description: "Cron 任务、定时提醒"
    agent_sequence:
      - scheduler    # 调度配置
      - worker       # 执行任务
    default_timeout: 300
    priority: low

  # ---------------------------------------------------------------------------
  # 9. 其他/兜底任务
  # ---------------------------------------------------------------------------
  - id: general
    name: "通用任务"
    description: "无特定专长任务时的兜底"
    agent_sequence:
      - worker       # 通用执行
      - reviewer     # 结果评估
    default_timeout: 300
    priority: low

# ---------------------------------------------------------------------------
# 协作模式定义 (4种)
# ---------------------------------------------------------------------------
collaboration_modes:
  # ---------------------------------------------------------------------------
  # 1. Agents as Tools - Agent 作为工具被主 Agent 调用
  # ---------------------------------------------------------------------------
  - id: tools
    name: "Agents as Tools"
    description: "Agent 作为工具被主 Agent 调用，是所有任务的默认模式"
    flow: "主 Agent 直接调用 Agent 执行任务"

  # ---------------------------------------------------------------------------
  # 2. Swarm - 多 Agent 自由协作
  # ---------------------------------------------------------------------------
  - id: swarm
    name: "Swarm"
    description: "多 Agent 自由协作，适用于需要并行探索的场景"
    flow: "多个 Agent 并行工作，自由协作"

  # ---------------------------------------------------------------------------
  # 3. Graph - 预定义 Agent 依赖图
  # ---------------------------------------------------------------------------
  - id: graph
    name: "Graph"
    description: "预定义 Agent 依赖图，适用于有明确依赖链的任务"
    flow: "按预定义依赖图顺序执行 Agent"

  # ---------------------------------------------------------------------------
  # 4. Workflow - 串行/并行混合，分阶段推进
  # ---------------------------------------------------------------------------
  - id: workflow
    name: "Workflow"
    description: "串行/并行混合，分阶段推进，适用于多阶段项目"
    flow: "分阶段推进，每阶段可串行或并行执行"

# ---------------------------------------------------------------------------
# 评估节点定义
# ---------------------------------------------------------------------------
evaluation_nodes:
  # ---------------------------------------------------------------------------
  # 方案评审 - critic (阶段3 方案确认)
  # ---------------------------------------------------------------------------
  - id: plan_review
    name: "方案评审"
    evaluator: critic
    trigger_stage: "方案确认"
    evaluation_criteria:
      - 技术方案合理性
      - 风险评估
      - must_haves 完整性
    required_for_approval: true
    must_haves_check: true

  # ---------------------------------------------------------------------------
  # 结果评估 - reviewer (阶段5 执行验证)
  # ---------------------------------------------------------------------------
  - id: result_evaluation
    name: "结果评估"
    evaluator: reviewer
    trigger_stage: "执行验证"
    evaluation_criteria:
      - 输出质量
      - 完整性检查
      - 需求匹配度
    required_for_approval: true
    must_haves_check: true

  # ---------------------------------------------------------------------------
  # 测试验证 - tester (阶段5 执行验证)
  # ---------------------------------------------------------------------------
  - id: test_verification
    name: "测试验证"
    evaluator: tester
    trigger_stage: "执行验证"
    evaluation_criteria:
      - 功能正确性
      - 测试覆盖率
      - 边界条件
    required_for_approval: true
    must_haves_check: true

  # ---------------------------------------------------------------------------
  # 代码审查 - critic (可选)
  # ---------------------------------------------------------------------------
  - id: code_review
    name: "代码审查"
    evaluator: critic
    trigger_stage: "执行验证"
    evaluation_criteria:
      - 代码规范
      - 安全检查
      - 性能考虑
    required_for_approval: false

# ---------------------------------------------------------------------------
# 审核汇总规则
# ---------------------------------------------------------------------------
review_summary_rules:
  # ---------------------------------------------------------------------------
  # 核心规则
  # ---------------------------------------------------------------------------
  core_rules:
    - id: all_must_pass
      description: "审核必须全部通过"
      action: "所有 required_for_approval=true 的审核节点必须通过才能进入下一阶段"

    - id: fail_redirect_research
      description: "审核不通过 → 重新进入研究分析阶段"
      action: "任何审核失败且无法修复时，重新回到研究分析阶段"

    - id: must_haves_required
      description: "must_haves 必须完成才能通过审核"
      action: "审核节点必须验证 must_haves 是否满足，未满足则不通过"

  # ---------------------------------------------------------------------------
  # 审核流程配置
  # ---------------------------------------------------------------------------
  flow_config:
    plan_review:
      trigger_condition: "must_haves 已明确且可验证"
      before_stage: "方案确认"
      failure_action: "重新进入研究分析阶段"
      max_retries: 3

    result_evaluation:
      trigger_condition: "子任务执行完成后"
      before_stage: "执行验证完成"
      failure_action: "修复后重新审核，连续3次失败则重新进入研究分析"
      max_retries: 3

    test_verification:
      trigger_condition: "功能实现完成后"
      before_stage: "执行验证完成"
      failure_action: "修复后重新测试，连续3次失败则重新进入研究分析"
      max_retries: 3

  # ---------------------------------------------------------------------------
  # must_haves 验证模板
  # ---------------------------------------------------------------------------
  must_haves_template: |
    ## must_haves 验证

    | 标准 | 状态 | 验证结果 |
    |------|------|----------|
    | [must_haves_1] | ✅/❌ | [验证详情] |
    | [must_haves_2] | ✅/❌ | [验证详情] |

    - 未满足项: [如有]
    - 处理方案: [如有]

  # ---------------------------------------------------------------------------
  # 审核失败记录模板
  # ---------------------------------------------------------------------------
  failure_record_template: |
    ## 审核失败记录

    - 审核节点: [plan_review/result_evaluation/test_verification]
    - 失败原因: [原因描述]
    - 尝试次数: [1-3]
    - 决策: [修复重试/重新进入研究分析]

# ---------------------------------------------------------------------------
# 失败处理策略
# ---------------------------------------------------------------------------
failure_handling:
  # ---------------------------------------------------------------------------
  # 默认失败策略
  # ---------------------------------------------------------------------------
  default:
    retry: true
    max_retries: 2
    fallback_sequence:
      - inspector    # 重新诊断
      - critic       # 评审问题
      - worker       # 兜底执行

  # ---------------------------------------------------------------------------
  # 任务类型特定失败策略
  # ---------------------------------------------------------------------------
  task_specific:
    fix:
      retry: true
      max_retries: 3
      fallback_sequence:
        - inspector    # 重新诊断问题
        - critic       # 评审修复方案
        - researcher   # 调研更好的解决方案

    feature:
      retry: true
      max_retries: 2
      fallback_sequence:
        - researcher   # 重新调研
        - architect    # 重新设计

    architecture:
      retry: true
      max_retries: 2
      fallback_sequence:
        - critic       # 重新评审
        - researcher   # 补充调研

    research:
      retry: false
      fallback_sequence:
        - worker       # 兜底执行

    documentation:
      retry: true
      max_retries: 2
      fallback_sequence:
        - reviewer     # 重新审查

    devops:
      retry: true
      max_retries: 2
      fallback_sequence:
        - devops       # 重新部署

    review:
      retry: true
      max_retries: 2
      fallback_sequence:
        - critic       # 重新评审

    scheduled:
      retry: false
      fallback_sequence: []

    general:
      retry: true
      max_retries: 2
      fallback_sequence:
        - worker       # 重新执行

# ---------------------------------------------------------------------------
# 6 阶段流程定义 (与 v2 SKILL.md 一致)
# ---------------------------------------------------------------------------
workflow_stages:
  - id: 1_planning
    name: "规划阶段"
    description: "任务拆解、选择 Agent"
    required: true

  - id: 2_dispatch
    name: "分发阶段"
    description: "选择合适的 Agent 进行分发"
    required: true

  - id: 3_execution
    name: "执行阶段"
    description: "Agent 具体任务执行"
    required: true

  - id: 4_evaluation
    name: "评估阶段"
    description: "结果评估、质量检查"
    required: true

  - id: 5_feedback
    name: "反馈阶段"
    description: "汇总结果、更新状态"
    required: true

  - id: 6_completion
    name: "完成阶段"
    description: "阶段汇报、任务完成"
    required: true
